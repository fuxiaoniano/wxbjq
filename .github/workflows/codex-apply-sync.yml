name: Codex Apply Sync

on:
  push:
    paths:
      - ".codex-sync/**"
      - ".github/workflows/codex-apply-sync.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply compressed payloads
        run: |
          python3 <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          expected = {
              "app.js": "26e88bbebd57f4f106da79414f5e2dc94c5f9556",
              "styles.css": "8544b28939d4bb2c008db94376d754cec3486727",
          }

          def git_blob_sha(data: bytes) -> str:
              header = f"blob {len(data)}\0".encode("utf-8")
              return hashlib.sha1(header + data).hexdigest()

          for target, expected_sha in expected.items():
              payload_path = Path(f".codex-sync/{target}.gz.b64")
              payload = "".join(payload_path.read_text(encoding="utf-8").split())
              data = gzip.decompress(base64.b64decode(payload))
              actual_sha = git_blob_sha(data)
              if actual_sha != expected_sha:
                  raise SystemExit(f"{target} sha mismatch: {actual_sha} != {expected_sha}")
              Path(target).write_bytes(data)
          PY
      - name: Commit restored files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js styles.css
          git rm -r --ignore-unmatch .codex-sync .github/workflows/codex-apply-sync.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Apply latest editor sync"
          git push
